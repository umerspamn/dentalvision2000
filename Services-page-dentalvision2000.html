<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dental Vision 2000 – Where Smiles Shine</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --white: #FAFEFF;
    --pearl: #F0F8FF;
    --enamel: #E8F4FD;
    --gum-red: #C0392B;
    --gum-red2: #A93226;
    --gum-pink: #E8637A;
    --gum-light: #F4A7B5;
    --gum-pale: #FDE8EC;
    --mint: #00BFA5;
    --toothpaste-blue: #1976D2;
    --deep: #0D1B2A;
    --mid: #344a5e;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{font-family:'DM Sans',sans-serif;background:var(--pearl);color:var(--deep);overflow-x:hidden;cursor:none;}

  /* ══ CURSOR ══ */
  .cursor{width:20px;height:20px;border:2px solid var(--gum-red);border-radius:50% 50% 50% 50%/60% 60% 40% 40%;position:fixed;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);transition:transform .15s,border-color .3s,background .3s;}
  .cursor-dot{width:6px;height:6px;background:var(--gum-red);border-radius:50%;position:fixed;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);}

  /* ══ PARTICLES ══ */
  .particles{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
  .particle{position:absolute;opacity:0;animation:floatUp linear infinite;}
  @keyframes floatUp{0%{transform:translateY(110vh) rotate(0deg);opacity:0}10%{opacity:.16}90%{opacity:.16}100%{transform:translateY(-20vh) rotate(360deg);opacity:0}}

  /* ══ LOADER ══ */
  .page-loader{position:fixed;inset:0;z-index:99999;background:white;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:1rem;transition:opacity .6s,visibility .6s;}
  .page-loader.hidden{opacity:0;visibility:hidden;}
  .loader-tooth{width:60px;height:70px;animation:toothSpin 1s linear infinite;}
  @keyframes toothSpin{from{transform:rotate(0deg) scale(1)}50%{transform:rotate(180deg) scale(1.1)}to{transform:rotate(360deg) scale(1)}}
  .loader-text{font-family:'Playfair Display',serif;font-size:1.2rem;color:var(--gum-red);animation:fadeToggle 1s ease-in-out infinite;}
  @keyframes fadeToggle{0%,100%{opacity:1}50%{opacity:.3}}

  /* ══ NAVBAR ══ */
  nav{position:fixed;top:0;width:100%;z-index:1000;background:rgba(250,254,255,.95);backdrop-filter:blur(20px);border-bottom:3px solid var(--gum-pink);padding:0 5%;display:flex;align-items:center;justify-content:space-between;height:72px;}
  .nav-logo{display:flex;align-items:center;gap:12px;text-decoration:none;}
  .nav-tooth-logo{width:42px;height:50px;animation:toothBounce 2s ease-in-out infinite;}
  @keyframes toothBounce{0%,100%{transform:translateY(0) rotate(-3deg)}50%{transform:translateY(-5px) rotate(3deg)}}
  .nav-logo-text{font-family:'Playfair Display',serif;font-weight:900;font-size:1.05rem;color:var(--deep);line-height:1.1;}
  .nav-logo-text span{color:var(--gum-red);}
  .nav-links{display:flex;gap:1.8rem;list-style:none;}
  .nav-links a{text-decoration:none;color:var(--deep);font-size:.88rem;font-weight:500;position:relative;padding-bottom:3px;}
  .nav-links a::after{content:'';position:absolute;bottom:0;left:0;width:0;height:2px;background:var(--gum-red);transition:width .3s;border-radius:2px;}
  .nav-links a:hover::after{width:100%;}
  .nav-cta{background:var(--gum-red);color:white;border:none;padding:10px 22px;border-radius:40px 40px 30px 30px;font-family:'DM Sans',sans-serif;font-weight:600;font-size:.88rem;cursor:none;transition:transform .2s,box-shadow .2s;box-shadow:0 4px 15px rgba(192,57,43,.3);}
  .nav-cta:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(192,57,43,.4);}

  /* ══ HERO ══ */
  #hero{min-height:100vh;background:linear-gradient(160deg,#fff 0%,var(--enamel) 50%,var(--gum-pale) 100%);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;padding-top:72px;}
  .hero-content{text-align:center;z-index:2;max-width:820px;padding:2rem;animation:heroEntrance 1.2s cubic-bezier(.16,1,.3,1) both;}
  @keyframes heroEntrance{from{opacity:0;transform:translateY(60px)}to{opacity:1;transform:translateY(0)}}
  .hero-badge{display:inline-block;background:var(--gum-pale);color:var(--gum-red);padding:6px 18px;border-radius:20px;font-size:.78rem;font-weight:600;letter-spacing:.06em;margin-bottom:1.4rem;border:1px solid var(--gum-light);animation:pulse 2s ease-in-out infinite;}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(232,99,122,.3)}50%{box-shadow:0 0 0 8px rgba(232,99,122,0)}}
  .hero-title{font-family:'Playfair Display',serif;font-size:clamp(2.6rem,7vw,5.2rem);font-weight:900;line-height:1.05;color:var(--deep);margin-bottom:1.4rem;}
  .hero-title .accent{color:var(--gum-red);display:block;}
  .hero-sub{font-size:1.05rem;color:#666;max-width:480px;margin:0 auto 1rem;line-height:1.75;}
  .hero-phone-badge{display:inline-flex;align-items:center;gap:.5rem;background:white;border:2px solid var(--gum-light);border-radius:30px;padding:8px 20px;font-size:.9rem;font-weight:600;color:var(--gum-red);margin-bottom:2rem;box-shadow:0 4px 15px rgba(192,57,43,.1);}
  .hero-btns{display:flex;gap:1rem;justify-content:center;flex-wrap:wrap;}
  .btn-primary{background:var(--gum-red);color:white;border:none;padding:15px 34px;border-radius:50px 50px 40px 40px;font-family:'DM Sans',sans-serif;font-weight:600;font-size:.95rem;cursor:none;transition:all .3s;box-shadow:0 6px 20px rgba(192,57,43,.35);}
  .btn-primary:hover{transform:translateY(-3px) scale(1.03);box-shadow:0 12px 30px rgba(192,57,43,.4);}
  .btn-secondary{background:transparent;color:var(--deep);border:2px solid var(--gum-pink);padding:13px 32px;border-radius:50px 50px 40px 40px;font-family:'DM Sans',sans-serif;font-weight:600;font-size:.95rem;cursor:none;transition:all .3s;}
  .btn-secondary:hover{background:var(--gum-pale);transform:translateY(-3px);}

  /* ══ TEETH ROW ══ */
  .hero-gum{position:absolute;bottom:0;left:0;right:0;height:60px;background:var(--gum-red);border-radius:50% 50% 0 0/100% 100% 0 0;}
  .hero-teeth-row{position:absolute;bottom:0;left:0;right:0;display:flex;justify-content:center;align-items:flex-end;gap:4px;padding:0 3%;animation:teethSlideUp 1s .5s cubic-bezier(.16,1,.3,1) both;}
  @keyframes teethSlideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
  .big-tooth{background:white;border:2px solid #ddd;position:relative;z-index:2;box-shadow:0 -4px 15px rgba(0,0,0,.1);transition:transform .3s;}
  .big-tooth:hover{transform:translateY(-10px);}
  .big-tooth::after{content:'';position:absolute;top:10px;left:50%;transform:translateX(-50%);width:28%;height:38%;background:rgba(200,230,255,.4);border-radius:50%;filter:blur(4px);}
  .tooth-incisor{width:52px;height:82px;border-radius:8px 8px 40% 40%/8px 8px 60% 60%;}
  .tooth-canine{width:42px;height:92px;border-radius:6px 6px 35% 50%/6px 6px 70% 80%;}
  .tooth-premolar{width:48px;height:72px;border-radius:8px 8px 40% 40%/8px 8px 55% 55%;}
  .tooth-molar{width:62px;height:62px;border-radius:10px 10px 35% 35%/10px 10px 50% 50%;}

  /* ══ MARQUEE ══ */
  .marquee-wrap{background:var(--gum-red);padding:11px 0;overflow:hidden;}
  .marquee-track{display:flex;gap:3rem;animation:marqueeScroll 22s linear infinite;white-space:nowrap;}
  @keyframes marqueeScroll{from{transform:translateX(0)}to{transform:translateX(-50%)}}
  .marquee-item{color:white;font-size:.84rem;font-weight:500;letter-spacing:.05em;flex-shrink:0;}

  /* ══ SECTION BASE ══ */
  section{padding:90px 5%;position:relative;}
  .section-title{font-family:'Playfair Display',serif;font-size:clamp(1.9rem,4.5vw,3.2rem);font-weight:900;text-align:center;margin-bottom:.4rem;}
  .section-title span{color:var(--gum-red);}
  .section-sub{text-align:center;color:#777;font-size:.98rem;margin-bottom:3.5rem;max-width:520px;margin-left:auto;margin-right:auto;margin-top:.5rem;line-height:1.7;}

  /* ══ DENTAL CHAIR HERO IMAGE STRIP ══ */
  .clinic-img-strip{background:var(--deep);padding:0;overflow:hidden;position:relative;height:380px;}
  .clinic-img-strip img{width:100%;height:100%;object-fit:cover;opacity:.75;transition:transform 8s ease;}
  .clinic-img-strip:hover img{transform:scale(1.04);}
  .clinic-img-overlay{position:absolute;inset:0;background:linear-gradient(90deg,rgba(13,27,42,.7) 0%,rgba(13,27,42,.2) 60%,transparent 100%);display:flex;align-items:center;padding:0 7%;}
  .clinic-img-text h2{font-family:'Playfair Display',serif;font-size:clamp(1.6rem,4vw,2.8rem);font-weight:900;color:white;line-height:1.2;margin-bottom:.8rem;}
  .clinic-img-text h2 em{color:var(--gum-light);font-style:italic;}
  .clinic-img-text p{color:rgba(255,255,255,.7);font-size:.95rem;max-width:380px;line-height:1.7;}

  /* ══ SERVICES ══ */
  #services{background:white;}
  .services-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:1.8rem;max-width:1100px;margin:0 auto;}
  .service-card{background:var(--pearl);border-radius:50% 50% 45% 45%/30% 30% 60% 60%;padding:2.8rem 1.4rem 2.2rem;text-align:center;border:2px solid #e8e8e8;position:relative;overflow:hidden;transition:transform .4s cubic-bezier(.16,1,.3,1),box-shadow .4s,background .3s;cursor:none;}
  .service-card::before{content:'';position:absolute;top:-2px;left:50%;transform:translateX(-50%);width:60%;height:6px;background:linear-gradient(90deg,transparent,rgba(200,230,255,.8),transparent);border-radius:3px;}
  .service-card:hover{transform:translateY(-12px) scale(1.02);box-shadow:0 20px 50px rgba(192,57,43,.15);border-color:var(--gum-pink);background:var(--gum-pale);}
  .service-card .icon{font-size:2.4rem;margin-bottom:.9rem;display:block;animation:iconFloat 3s ease-in-out infinite;}
  @keyframes iconFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
  .service-card h3{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:700;margin-bottom:.6rem;color:var(--deep);}
  .service-card p{font-size:.86rem;color:#666;line-height:1.6;}

  /* ══ PHOTO GALLERY (3 treatment photos) ══ */
  #gallery{background:var(--enamel);padding:90px 5%;}
  .gallery-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1.2rem;max-width:1100px;margin:0 auto;}
  .gallery-item{border-radius:20px 20px 50% 50%/20px 20px 30% 30%;overflow:hidden;position:relative;aspect-ratio:3/4;border:3px solid #ddd;box-shadow:0 8px 30px rgba(0,0,0,.1);transition:transform .4s,box-shadow .4s,border-color .3s;cursor:none;}
  .gallery-item:hover{transform:translateY(-10px) scale(1.02);box-shadow:0 20px 50px rgba(192,57,43,.18);border-color:var(--gum-pink);}
  .gallery-item img{width:100%;height:100%;object-fit:cover;transition:transform .5s;}
  .gallery-item:hover img{transform:scale(1.08);}
  .gallery-item-label{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(192,57,43,.85));padding:1.5rem 1rem 1rem;color:white;font-family:'Playfair Display',serif;font-size:1rem;font-weight:700;text-align:center;}
  .gallery-item::before{content:'';position:absolute;top:10px;left:20%;right:30%;height:20%;background:rgba(255,255,255,.25);border-radius:50%;filter:blur(8px);transform:rotate(-15deg);z-index:1;}

  /* ══ DIVIDER ══ */
  .toothpaste-divider{width:100%;height:12px;background:repeating-linear-gradient(90deg,var(--gum-red) 0%,var(--gum-red) 30%,white 30%,white 35%,var(--mint) 35%,var(--mint) 65%,white 65%,white 70%,var(--toothpaste-blue) 70%,var(--toothpaste-blue) 100%);opacity:.55;}

  /* ══ ABOUT ══ */
  #about{background:linear-gradient(135deg,var(--deep) 0%,#1a2a3a 100%);color:white;overflow:hidden;}
  #about .section-title{color:white;}
  #about .section-sub{color:rgba(255,255,255,.55);}
  .toothbrush-container{max-width:940px;margin:0 auto;display:flex;align-items:center;gap:4rem;}
  .brush-wrap{flex-shrink:0;animation:brushScrub 2s ease-in-out infinite;}
  @keyframes brushScrub{0%,100%{transform:rotate(-5deg) translateX(0)}50%{transform:rotate(5deg) translateX(10px)}}
  .about-text h2{font-family:'Playfair Display',serif;font-size:2.1rem;font-weight:900;margin-bottom:1rem;line-height:1.2;}
  .about-text h2 span{color:var(--gum-light);}
  .about-text p{color:rgba(255,255,255,.72);line-height:1.8;margin-bottom:1rem;font-size:.95rem;}
  .about-stats{display:flex;gap:2rem;margin-top:2rem;flex-wrap:wrap;}
  .stat{text-align:center;}
  .stat-num{font-family:'Playfair Display',serif;font-size:2.4rem;font-weight:900;color:var(--gum-light);display:block;}
  .stat-label{font-size:.78rem;color:rgba(255,255,255,.45);}

  /* ══ X-RAY SECTION ══ */
  .xray-section{background:var(--deep);padding:70px 5%;overflow:hidden;}
  .xray-inner{max-width:1000px;margin:0 auto;display:flex;align-items:center;gap:3rem;}
  .xray-img-wrap{flex-shrink:0;width:320px;border-radius:20px 20px 50% 50%/20px 20px 30% 30%;overflow:hidden;border:3px solid rgba(255,255,255,.15);box-shadow:0 0 40px rgba(0,191,165,.2);position:relative;animation:xrayPulse 3s ease-in-out infinite;}
  @keyframes xrayPulse{0%,100%{box-shadow:0 0 40px rgba(0,191,165,.2)}50%{box-shadow:0 0 70px rgba(0,191,165,.45)}}
  .xray-img-wrap img{width:100%;display:block;filter:brightness(.9) contrast(1.1);}
  .xray-img-wrap::after{content:'';position:absolute;inset:0;background:linear-gradient(transparent 60%,rgba(0,191,165,.15));pointer-events:none;}
  .xray-text{color:white;}
  .xray-text h3{font-family:'Playfair Display',serif;font-size:2rem;font-weight:900;margin-bottom:1rem;color:var(--mint);}
  .xray-text p{color:rgba(255,255,255,.68);line-height:1.8;font-size:.95rem;margin-bottom:1rem;}
  .xray-badge{display:inline-flex;align-items:center;gap:.5rem;background:rgba(0,191,165,.15);border:1px solid rgba(0,191,165,.4);color:var(--mint);padding:6px 16px;border-radius:20px;font-size:.8rem;font-weight:600;}

  /* ══ TESTIMONIALS ══ */
  #testimonials{background:var(--enamel);}
  .testimonials-scroll{display:flex;gap:1.5rem;max-width:1100px;margin:0 auto;overflow-x:auto;padding-bottom:1rem;scrollbar-width:none;}
  .testimonials-scroll::-webkit-scrollbar{display:none;}
  .testimonial-tube{flex-shrink:0;width:265px;background:white;position:relative;padding:2.2rem 1.4rem 1.4rem;border-radius:60% 60% 20px 20px/40% 40% 20px 20px;box-shadow:0 8px 30px rgba(0,0,0,.08);border-top:4px solid var(--toothpaste-blue);border-left:2px solid #e0e0e0;border-right:2px solid #e0e0e0;transition:transform .3s;cursor:none;overflow:hidden;}
  .testimonial-tube::before{content:'';position:absolute;top:-20px;left:50%;transform:translateX(-50%);width:40px;height:22px;background:var(--toothpaste-blue);border-radius:4px 4px 0 0;clip-path:polygon(10% 100%,90% 100%,100% 0%,0% 0%);}
  .tube-stripe{position:absolute;top:0;left:0;right:0;height:8px;background:repeating-linear-gradient(90deg,var(--toothpaste-blue) 0px,var(--toothpaste-blue) 20px,white 20px,white 24px,var(--mint) 24px,var(--mint) 44px,white 44px,white 48px);border-radius:60% 60% 0 0/40% 40% 0 0;opacity:.4;}
  .testimonial-tube:hover{transform:translateY(-8px) rotate(-1deg);}
  .testimonial-stars{color:#FFB300;font-size:1rem;margin-bottom:.7rem;letter-spacing:2px;}
  .testimonial-text{font-size:.86rem;color:#555;line-height:1.7;margin-bottom:1rem;font-style:italic;}
  .testimonial-author{font-weight:600;font-size:.84rem;color:var(--deep);}
  .testimonial-tag{font-size:.73rem;color:var(--gum-red);}

  /* ══ TEAM ══ */
  #team{background:white;}
  .team-grid{display:flex;gap:3rem;justify-content:center;flex-wrap:wrap;max-width:700px;margin:0 auto;}
  .doctor-card{width:240px;text-align:center;}
  .doctor-avatar{width:180px;height:220px;margin:0 auto 1rem;background:var(--enamel);border-radius:50% 50% 45% 45%/40% 40% 55% 55%;display:flex;align-items:center;justify-content:center;font-size:4.5rem;position:relative;overflow:hidden;border:3px solid #e8e8e8;transition:transform .4s,border-color .3s;cursor:none;}
  .doctor-card:hover .doctor-avatar{transform:translateY(-8px) rotate(-2deg);border-color:var(--gum-pink);}
  .doctor-avatar::before{content:'';position:absolute;top:8px;left:20%;right:40%;height:28%;background:rgba(255,255,255,.5);border-radius:50%;filter:blur(6px);transform:rotate(-20deg);}
  .doctor-gum{position:absolute;bottom:0;left:-5%;right:-5%;height:32px;background:var(--gum-red);border-radius:50% 50% 0 0;}
  .doctor-name{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:700;margin-bottom:.2rem;}
  .doctor-role{font-size:.8rem;color:var(--gum-red);margin-bottom:.3rem;}
  .doctor-exp{font-size:.78rem;color:#888;}

  /* ══ BOOKING FORM ══ */
  #booking{background:linear-gradient(160deg,var(--gum-pale) 0%,white 60%,var(--enamel) 100%);}
  .booking-wrapper{max-width:580px;margin:0 auto;position:relative;}
  .tooth-form-outer{background:white;border-radius:20px 20px 50% 50%/20px 20px 30% 30%;border:3px solid #e0e0e0;padding:3rem 3rem 4rem;box-shadow:0 20px 60px rgba(0,0,0,.1);position:relative;overflow:hidden;transition:border-color .5s;}
  .tooth-form-outer::before{content:'';position:absolute;top:0;left:15%;right:15%;height:8px;background:linear-gradient(90deg,transparent,rgba(200,230,255,.6),transparent);border-radius:0 0 50% 50%;}
  .gum-base{position:absolute;bottom:-5px;left:-3px;right:-3px;height:0;background:var(--gum-red);border-radius:50% 50% 30px 30px/30% 30% 30px 30px;transition:height .9s cubic-bezier(.16,1,.3,1);z-index:0;}
  .tooth-form-outer.submitted{border-color:var(--gum-red);}
  .tooth-form-outer.submitted .gum-base{height:80px;}
  .form-inner{position:relative;z-index:1;}
  .form-group{margin-bottom:1.3rem;}
  .form-group label{display:block;font-size:.77rem;font-weight:700;color:var(--gum-red);margin-bottom:.38rem;text-transform:uppercase;letter-spacing:.07em;}
  .form-group input,.form-group select,.form-group textarea{width:100%;padding:12px 16px;border:2px solid #e8e8e8;border-radius:30px 30px 25px 25px/30px 30px 35px 35px;font-family:'DM Sans',sans-serif;font-size:.93rem;background:var(--pearl);color:var(--deep);outline:none;transition:border-color .3s,transform .2s,box-shadow .3s;cursor:none;}
  .form-group textarea{border-radius:15px 15px 20px 20px;resize:none;height:88px;}
  .form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--gum-red);box-shadow:0 0 0 4px rgba(192,57,43,.1);transform:translateY(-2px);}
  .form-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem;}
  .submit-btn{width:100%;padding:15px;background:var(--gum-red);color:white;border:none;border-radius:50px 50px 40px 40px;font-family:'DM Sans',sans-serif;font-weight:700;font-size:.97rem;cursor:none;position:relative;overflow:hidden;transition:transform .3s,box-shadow .3s;box-shadow:0 6px 20px rgba(192,57,43,.35);}
  .submit-btn:hover{transform:translateY(-3px);box-shadow:0 12px 30px rgba(192,57,43,.4);}
  .submit-btn .btn-shine{position:absolute;top:0;left:-100%;width:60%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.3),transparent);transform:skewX(-20deg);transition:left .6s;}
  .submit-btn:hover .btn-shine{left:150%;}

  /* ══ SUCCESS OVERLAY ══ */
  .success-overlay{position:absolute;inset:0;z-index:10;background:var(--gum-red);border-radius:20px 20px 50% 50%/20px 20px 30% 30%;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:1rem;opacity:0;pointer-events:none;transition:opacity .5s .6s;}
  .success-overlay.active{opacity:1;pointer-events:all;}
  .success-tooth{width:80px;}
  .success-bounce{animation:successBounce .6s ease forwards;}
  @keyframes successBounce{0%{transform:scale(0) rotate(-20deg)}60%{transform:scale(1.2) rotate(5deg)}100%{transform:scale(1) rotate(0)}}
  .success-overlay h3{font-family:'Playfair Display',serif;font-size:1.8rem;color:white;font-weight:900;}
  .success-overlay p{color:rgba(255,255,255,.8);font-size:.93rem;text-align:center;}

  /* ══ CONTACT & MAP ══ */
  #contact{background:var(--deep);color:white;padding:90px 5%;}
  #contact .section-title{color:white;}
  #contact .section-su
